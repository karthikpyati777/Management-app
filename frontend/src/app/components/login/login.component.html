<div class="auth-container">
  <div class="auth-card">
    <h2>Login</h2>
    <form (ngSubmit)="login()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="credentials.email" name="email" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="credentials.password" name="password" required>
      </div>
      <p class="error" *ngIf="error">{{error}}</p>
      <button type="submit" class="btn-submit">Login</button>
    </form>
    <p class="link">Don't have an account? <a routerLink="/register">Register</a></p>
  </div>
</div>
