<div class="admin-container">
  <div class="admin-header">
    <h2>👥 User Management</h2>
    <button class="btn-primary" (click)="openForm()">+ Add User</button>
  </div>

  <div class="table-container">
    <table class="data-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Username</th>
          <th>Email</th>
          <th>Role</th>
          <th>Created At</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users">
          <td>{{user.id}}</td>
          <td>{{user.username}}</td>
          <td>{{user.email}}</td>
          <td><span class="badge" [class.badge-instructor]="user.role === 'INSTRUCTOR'">{{user.role || 'STUDENT'}}</span></td>
          <td>{{user.createdAt | date:'short'}}</td>
          <td>
            <button class="btn-edit" (click)="openForm(user)">Edit</button>
            <button class="btn-delete" (click)="deleteUser(user.id)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Modal Form -->
  <div class="modal" *ngIf="showForm">
    <div class="modal-content">
      <div class="modal-header">
        <h3>{{editMode ? 'Edit User' : 'Add New User'}}</h3>
        <button class="close-btn" (click)="closeForm()">&times;</button>
      </div>
      <form (ngSubmit)="saveUser()">
        <div class="form-group">
          <label>Username</label>
          <input type="text" [(ngModel)]="currentUser.username" name="username" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="currentUser.email" name="email" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" [(ngModel)]="currentUser.password" name="password" [required]="!editMode">
        </div>
        <div class="form-group">
          <label>Role</label>
          <select [(ngModel)]="currentUser.role" name="role">
            <option value="STUDENT">Student</option>
            <option value="INSTRUCTOR">Instructor</option>
            <option value="ADMIN">Admin</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" (click)="closeForm()">Cancel</button>
          <button type="submit" class="btn-save">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>
