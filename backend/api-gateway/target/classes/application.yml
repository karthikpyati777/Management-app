spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/users/**
        
        - id: course-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/courses/**

server:
  port: 8080

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
